name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Refresh TURN credentials every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch fresh TURN credentials
        run: |
          curl -s https://speed.cloudflare.com/turn-creds > public/turn-creds.json
          echo "TURN creds fetched:"
          cat public/turn-creds.json | head -c 80
          echo ""
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
